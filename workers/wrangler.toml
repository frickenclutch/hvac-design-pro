name = "hvac-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "hvac-design-pro"
database_id = "placeholder-will-be-set-after-create"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "hvac-assets"

[env.dev]
name = "hvac-api-dev"

[env.dev.vars]
ENVIRONMENT = "development"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "hvac-design-pro-dev"
database_id = "placeholder-dev"

[[env.dev.r2_buckets]]
binding = "STORAGE"
bucket_name = "hvac-assets-dev"
