services:
  postgres:
    image: postgres:16-alpine
    container_name: hvacpro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: hvacpro_default
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d
      - ./database:/docker-entrypoint-initdb.d/database
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hvac-network

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: hvacpro-api-gateway
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:supersecretpassword@postgres:5432/hvacpro_default
    networks:
      - hvac-network

  calc-service:
    build:
      context: ./calc-service
      dockerfile: Dockerfile
    container_name: hvacpro-calc-service
    ports:
      - "8000:8000"
    networks:
      - hvac-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hvacpro-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    networks:
      - hvac-network

volumes:
  postgres_data:

networks:
  hvac-network:
    driver: bridge
